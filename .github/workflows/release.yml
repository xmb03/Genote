name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build binary
        run: cargo build --release

      - name: Prepare archive
        run: |
          BIN=$(grep '^name = ' Cargo.toml | head -1 | sed 's/name = "\(.*\)"/\1/')
          mkdir -p dist
          cp "target/release/$BIN" dist/
          cd dist && tar czf "../$BIN-linux-x86_64.tar.gz" "$BIN"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: genote-*.tar.gz
          body: |
            ### Changes in ${{ github.ref_name }}
            - **Multi-topic mode** — generate several notes in one command: `genote "Topic A" "Topic B" "Topic C"`.
            - **Sequential generation** — each note is a fresh Ollama request with full context reset, no context bleed.
            - Each topic independently supports `(hint)` syntax.
            - Errors in one topic don't interrupt the rest of the batch.
            - Progress indicator `[N/M]` per note.
