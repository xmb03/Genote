name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build binary
        run: cargo build --release

      - name: Prepare archive
        run: |
          BIN=$(grep '^name = ' Cargo.toml | head -1 | sed 's/name = "\(.*\)"/\1/')
          mkdir -p dist
          cp "target/release/$BIN" dist/
          cd dist && tar czf "../$BIN-linux-x86_64.tar.gz" "$BIN"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: genote-*.tar.gz
          body: |
            ### Changes in ${{ github.ref_name }}
            - **Profiles** — `[profile.xxx]` sections in `config.toml` with multi-field inheritance: global defaults → profile → CLI flags.
            - `--profile` flag to select a profile at runtime.
            - **Slimmer codebase** — core logic reduced by 20% (397 → 318 lines): unified config merge, single-pass directory scan, reusable validation helper.
            - See `config.toml.example` for profile syntax and flat-mode setup.
