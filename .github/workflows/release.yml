name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build binary
        run: cargo build --release

      - name: Prepare archive
        run: |
          BIN=$(grep '^name = ' Cargo.toml | head -1 | sed 's/name = "\(.*\)"/\1/')
          mkdir -p dist
          cp "target/release/$BIN" dist/
          cd dist && tar czf "../$BIN-linux-x86_64.tar.gz" "$BIN"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: genote-*.tar.gz
          body: |
            See the [README](https://github.com/xmb03/Genote#readme) for setup instructions.

            ### Changes in ${{ github.ref_name }}
            - All config options are now overridable via CLI flags (`--model`, `--api-url`, `--notes-dir`, `--lang`, `--note-size`, `--notes-count`, `--use-covered-topics`).
            - `--note-size small` now targets 15-30 lines (was 3-5 sentences).
            - Optional `(hint)` in the topic argument lets you pass extra instructions to the model without affecting the filename.
            - Strict prompt rewrite: model no longer copies example length, follows size instruction precisely.
            - Added `clap` for robust CLI argument parsing with `--help`.
